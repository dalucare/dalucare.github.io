<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Dalucare Profissional</title>
  <script src="../js/force-https.js?v=20260722s"></script>
  <link rel="stylesheet" href="../css/style.css?v=20260722s">
  <link rel="stylesheet" href="css/dash.css?v=20260722s">
  <script src="js/auth.js?v=20260722s"></script>
</head>
<body class="pagina-app">
  <header class="app-topo">
    <div class="container">
      <a class="logo" href="../index.html">Dalucare</a>
      <a class="link-voltar" href="../index.html">← Voltar ao site</a>
    </div>
  </header>

  <main class="app-centro">
    <div class="auth-card">
      <h1>Área do profissional</h1>
      <p class="auth-subtitulo">Painel clínico Dalucare (agenda, pacientes e prontuário).</p>

      <div class="demo-acessos">
        <button type="button" class="btn btn-principal" id="btn-demo-pro" style="width: 100%;">Entrar no painel agora</button>
        <p class="demo-titulo" style="margin-top: 12px;">Ou use seu e-mail e senha</p>
      </div>

      <form id="form-login" class="formulario">
        <div class="linha-form">
          <div class="campo">
            <label for="login-email">E-mail</label>
            <input type="email" id="login-email" name="email" placeholder="voce@exemplo.com" required autocomplete="email">
          </div>
        </div>

        <div class="linha-form">
          <div class="campo">
            <label for="login-senha">Senha</label>
            <input type="password" id="login-senha" name="senha" placeholder="Digite sua senha" required autocomplete="current-password" minlength="6">
          </div>
        </div>

        <button type="submit" class="btn btn-principal" id="btn-login" style="width: 100%;">Entrar</button>
        <p id="aviso-login" class="aviso-form"></p>
      </form>

      <p class="auth-links">
        <button type="button" class="link-suave" id="btn-mostrar-recuperar">Esqueci minha senha</button>
      </p>

      <form id="form-recuperar" class="formulario" hidden>
        <p class="auth-subtitulo">Defina uma nova senha para o e-mail já cadastrado neste navegador.</p>
        <div class="linha-form">
          <div class="campo">
            <label for="recuperar-email">E-mail</label>
            <input type="email" id="recuperar-email" required autocomplete="email">
          </div>
        </div>
        <div class="linha-form">
          <div class="campo">
            <label for="recuperar-senha">Nova senha</label>
            <input type="password" id="recuperar-senha" required minlength="6" autocomplete="new-password">
          </div>
        </div>
        <div class="linha-form">
          <div class="campo">
            <label for="recuperar-confirmar">Confirmar nova senha</label>
            <input type="password" id="recuperar-confirmar" required minlength="6" autocomplete="new-password">
          </div>
        </div>
        <button type="submit" class="btn btn-principal" id="btn-recuperar" style="width: 100%;">Salvar nova senha e entrar</button>
        <p id="aviso-recuperar" class="aviso-form"></p>
      </form>

      <p class="auth-links">
        Não tem conta? <a href="cadastro.html?v=20260722s">Cadastre-se como profissional</a>
      </p>
    </div>
  </main>

  <script>
    if (obterSessao()) {
      window.location.href = "app.html?v=20260722s";
    }

    const formLogin = document.getElementById("form-login");
    const formRecuperar = document.getElementById("form-recuperar");
    const avisoLogin = document.getElementById("aviso-login");
    const avisoRecuperar = document.getElementById("aviso-recuperar");
    const btnLogin = document.getElementById("btn-login");
    const btnRecuperar = document.getElementById("btn-recuperar");
    const btnMostrar = document.getElementById("btn-mostrar-recuperar");
    const DESTINO = "app.html?v=20260722s";

    function entrarPainelDemo() {
      garantirUsuarioDemo({
        nome: "Dr. João Silva",
        email: "profissional@dalucare.demo",
        senha: "demo123",
        tipo: "profissional",
      });
      autenticarUsuario("profissional@dalucare.demo", "demo123");
      window.location.href = DESTINO;
    }

    document.getElementById("btn-demo-pro").addEventListener("click", function () {
      try {
        entrarPainelDemo();
      } catch (erro) {
        mostrarAviso(avisoLogin, erro.message, "erro");
      }
    });

    btnMostrar.addEventListener("click", function () {
      formRecuperar.hidden = !formRecuperar.hidden;
      if (!formRecuperar.hidden) {
        document.getElementById("recuperar-email").value =
          document.getElementById("login-email").value;
      }
    });

    formLogin.addEventListener("submit", function (evento) {
      evento.preventDefault();
      const email = document.getElementById("login-email").value;
      const senha = document.getElementById("login-senha").value;
      btnLogin.disabled = true;
      btnLogin.textContent = "Entrando...";

      try {
        var sessao = autenticarUsuario(email, senha);
        sessao.tipo = "profissional";
        localStorage.setItem("dalucare_sessao", JSON.stringify(sessao));
        window.location.href = DESTINO;
      } catch (erro) {
        mostrarAviso(avisoLogin, erro.message, "erro");
        btnLogin.disabled = false;
        btnLogin.textContent = "Entrar";
      }
    });

    formRecuperar.addEventListener("submit", function (evento) {
      evento.preventDefault();
      btnRecuperar.disabled = true;
      btnRecuperar.textContent = "Salvando...";
      try {
        var sessao = redefinirSenha(
          document.getElementById("recuperar-email").value,
          document.getElementById("recuperar-senha").value,
          document.getElementById("recuperar-confirmar").value
        );
        sessao.tipo = "profissional";
        localStorage.setItem("dalucare_sessao", JSON.stringify(sessao));
        window.location.href = DESTINO;
      } catch (erro) {
        mostrarAviso(avisoRecuperar, erro.message, "erro");
        btnRecuperar.disabled = false;
        btnRecuperar.textContent = "Salvar nova senha e entrar";
      }
    });
  </script>
</body>
</html>
