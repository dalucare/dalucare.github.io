<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro profissional | Dalucare</title>
  <script src="../js/force-https.js?v=20260722aj"></script>
  <link rel="stylesheet" href="../css/style.css?v=20260722aj">
  <link rel="stylesheet" href="css/dash.css?v=20260722aj">
  <script src="js/auth.js?v=20260722aj"></script>
</head>
<body class="pagina-app">
  <header class="app-topo">
    <div class="container">
      <a class="logo" href="../index.html">Dalucare</a>
      <a class="link-voltar" href="login.html">�?� Já tenho conta</a>
    </div>
  </header>

  <main class="app-centro">
    <div class="auth-card">
      <h1>Criar conta profissional</h1>
      <p class="auth-subtitulo">Nome e CRM serão enviados ao receituário MedHub automaticamente.</p>

      <form id="form-cadastro" class="formulario">
        <input type="hidden" id="cadastro-tipo" name="tipo" value="profissional">

        <div class="linha-form">
          <div class="campo">
            <label for="cadastro-nome">Nome completo</label>
            <input type="text" id="cadastro-nome" name="nome" placeholder="Seu nome" required minlength="3" autocomplete="name">
          </div>
        </div>

        <div class="linha-form">
          <div class="campo">
            <label for="cadastro-email">E-mail</label>
            <input type="email" id="cadastro-email" name="email" placeholder="voce@exemplo.com" required autocomplete="email">
          </div>
        </div>

        <div class="linha-form" style="display:grid;grid-template-columns:1fr 2fr;gap:12px;">
          <div class="campo">
            <label for="cadastro-crm-uf">UF CRM</label>
            <select id="cadastro-crm-uf" required>
              <option value="SP" selected>SP</option>
              <option value="RJ">RJ</option>
              <option value="MG">MG</option>
              <option value="ES">ES</option>
              <option value="PR">PR</option>
              <option value="SC">SC</option>
              <option value="RS">RS</option>
              <option value="BA">BA</option>
              <option value="PE">PE</option>
              <option value="CE">CE</option>
              <option value="DF">DF</option>
              <option value="GO">GO</option>
              <option value="MT">MT</option>
              <option value="MS">MS</option>
              <option value="PA">PA</option>
              <option value="AM">AM</option>
              <option value="MA">MA</option>
              <option value="PB">PB</option>
              <option value="RN">RN</option>
              <option value="AL">AL</option>
              <option value="SE">SE</option>
              <option value="PI">PI</option>
              <option value="TO">TO</option>
              <option value="RO">RO</option>
              <option value="AC">AC</option>
              <option value="AP">AP</option>
              <option value="RR">RR</option>
            </select>
          </div>
          <div class="campo">
            <label for="cadastro-crm">CRM</label>
            <input type="text" id="cadastro-crm" name="crm" placeholder="Somente números" required inputmode="numeric" pattern="[0-9]+" minlength="4" maxlength="10">
          </div>
        </div>

        <div class="linha-form">
          <div class="campo">
            <label for="cadastro-senha">Senha</label>
            <input type="password" id="cadastro-senha" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
          </div>
        </div>

        <div class="linha-form">
          <div class="campo">
            <label for="cadastro-confirmar">Confirmar senha</label>
            <input type="password" id="cadastro-confirmar" name="confirmarSenha" placeholder="Repita a senha" required minlength="6" autocomplete="new-password">
          </div>
        </div>

        <button type="submit" class="btn btn-principal" id="btn-cadastro" style="width: 100%;">Criar conta</button>
        <p id="aviso-cadastro" class="aviso-form"></p>
      </form>

      <p class="auth-links">
        Já tem conta? <a href="login.html?v=20260722aj">Faça login</a>
      </p>
    </div>
  </main>

  <script>
    if (obterSessao()) {
      window.location.href = "app.html?v=20260722aj";
    }

    const formCadastro = document.getElementById("form-cadastro");
    const avisoCadastro = document.getElementById("aviso-cadastro");
    const btnCadastro = document.getElementById("btn-cadastro");

    formCadastro.addEventListener("submit", function (evento) {
      evento.preventDefault();

      const dados = {
        nome: document.getElementById("cadastro-nome").value,
        email: document.getElementById("cadastro-email").value,
        senha: document.getElementById("cadastro-senha").value,
        confirmarSenha: document.getElementById("cadastro-confirmar").value,
        tipo: "profissional",
        crm: document.getElementById("cadastro-crm").value,
        crmUf: document.getElementById("cadastro-crm-uf").value,
      };

      btnCadastro.disabled = true;
      btnCadastro.textContent = "Criando conta...";

      try {
        cadastrarUsuario(dados);
        autenticarUsuario(dados.email, dados.senha);
        window.location.href = "app.html?v=20260722aj";
      } catch (erro) {
        mostrarAviso(avisoCadastro, erro.message, "erro");
        btnCadastro.disabled = false;
        btnCadastro.textContent = "Criar conta";
      }
    });
  </script>
</body>
</html>
